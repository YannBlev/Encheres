<html lang="en" layout:decorate="~{layout/base}" xmlns:layout="http://www.w3.org/1999/xhtml">
<main layout:fragment="content">

    <section>
    <h1>Please Log In</h1>
    <div class="input-box" th:if="${param.error}">
        Invalid username and password.</div>
    <div class="input-box" th:if="${param.logout}">
        You have been logged out.</div>
    <form class="form" th:action="@{/login}" method="post">
        <div class="input-box">
            <input type="text" name="username" placeholder="Username"/>
        </div>
        <br>
        <div class="input-box">
            <input type="password" name="password" placeholder="Password"/>
        </div>
        <br>
        <button class="login-btn"> Log in </button>
        <a th:href="@{/profil/nouveauProfil}"> Inscription</a>

    </form>
    </section>
</main>
