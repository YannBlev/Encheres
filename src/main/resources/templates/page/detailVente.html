<!DOCTYPE html>
<html lang="en" layout:decorate="~{layout/base}" xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title th:text="#{detail.titre}">Détail Vente</title>
</head>
<body>
<main layout:fragment="content">

    <img th:src="@{|${article.imagePath}|}" style="width:200px" th:alt="#{detail.img.alt}">

    <label th:text="#{detail.intitule}">Intitulé : </label>
    <span th:text="${article.nomArticle}"></span><br>

    <label th:text="#{detail.description}">Description : </label>
    <textarea cols="20" rows="4" type="text" th:text="${article.description}"></textarea><br>

    <label th:text="#{detail.categorie}">Catégorie : </label>
    <span th:text="${article.categorie.libelle}"></span><br>

    <label th:text="#{detail.meilleureOffre}">Meilleure offre : </label>
    <span></span><br>

    <label th:text="#{detail.miseAPrix}">Mise à prix : </label>
    <span th:text="${article.prixInitial}"></span><br>

    <label th:text="#{detail.finEnchere}">Fin de l'enchère : </label>
    <span th:text="${article.dateFinEncheres}"></span><br>

    <label th:text="#{detail.retrait}">Retrait : </label>
    <span th:text="${retrait.rue}"></span><br>
    <span th:text="${retrait.code_postal}"></span><br>
    <span th:text="${retrait.ville}"></span><br>

    <label th:text="#{detail.vendeur}">Vendeur : </label>
    <span th:text="${article.vendeur.pseudo}"></span><br>

    <form sec:authorize="isAuthenticated()" th:action="@{|/encheres/${article.noArticle}/encherir|}" method="post">

        <label th:text="#{detail.maProposition}">Ma proposition : </label>
        <input type="number" name="proposition"><br>

        <input type="submit" th:value="#{detail.btn.encherir}">

    </form>

</main>

</body>

</html>
