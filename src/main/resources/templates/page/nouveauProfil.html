<head>
                                <meta charset="UTF-8">
                            <title>Création de mon profil</title>
                <!--    Nouveau profil dans le menu : s'inscrire ou se connecter -->
                    <!--TODO modifier avec les bonnes valeurs dans l'énnoncé-->
                <!--    Nouveau profil dans le menu : s'inscrire ou se connecter -->

<body>

<main layout:fragment="content">


    <form th:action="@{/profil/nouveauProfil}" method="post" th:object="${utilisateur}">

        <label for="pseudo">Pseudo : </label>
        <input type="text" id="pseudo" th:field="*{pseudo}"
               pattern="[a-zA-Z0-9]{3,20}"
               title="Le pseudo doit contenir entre 3 et 20 caractères alphanumériques"
               minlength="3"
               maxlength="20"
               required><br>

        <label for="nom">Nom : </label>
        <input type="text" id="nom" th:field="*{nom}"
               pattern="[a-zA-ZÀ-ÿ\-\s]{3,30}"
               title="Le nom ne doit contenir que des lettres entre 3 et 30 caractères"
               maxlength="30"
               required><br>

        <label for="prenom">Prenom : </label>
        <input type="text" id="prenom" th:field="*{prenom}"
               pattern="[a-zA-ZÀ-ÿ\-\s]{3,30}"
               title="Le prénom ne doit contenir que des lettres entre 3 et 30 caractères"
               maxlength="30"
               required><br>

        <label for="email">Email : </label>
        <input type="email" id="email" th:field="*{email}"
               title="Veuillez entrer une retrait email valide"
               maxlength="50"
               required><br>

        <label for="telephone">Télephone : </label>
        <input type="tel" id="telephone" th:field="*{telephone}"
               pattern="[0-9\+\s\-]{10,15}"
               title="Le téléphone ne doit contenir que des chiffres entre 10 et 15 chiffres"
               minlength="10"
               maxlength="15"
               required><br>

        <label for="rue">Rue : </label>
        <input type="text" id="rue" th:field="*{rue}"
               pattern="[a-zA-ZÀ-ÿ0-9\s\-\,\.]{5,100}"
               title="Adresse invalide"
               maxlength="100"
               required><br>

        <label for="codePostal">Code Postal : </label>
        <input type="text" id="codePostal" th:field="*{codePostal}"
               pattern="[0-9]{5}"
               title="Le code postal doit contenir 5 chiffres"
               required><br>

        <label for="ville">Ville : </label>
        <input type="text" id="ville" th:field="*{ville}"
               pattern="[a-zA-ZÀ-ÿ\s\-]{2,50}"
               title="La ville ne doit contenir que des lettres"
               maxlength="50"
               required><br>

        <label for="motDePasse">Mot de passe : </label>
        <input type="password" id="motDePasse" th:field="*{motDePasse}"
               pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9]).{8,}"
               title="Le mot de passe doit contenir au moins 8 caractères, une majuscule, une minuscule et un chiffre"
               required><br>


                        <!-- Script Oeil pour voir/cacher le mot de passe
            TODO AJOUTER LE CSS pour le mettre correctement à côté du champ Mot de passe-->

        <div class="password-icon" onclick="togglePassword()">
            <i id="eye-icon" data-feather="eye"></i>
            <i id="eye-off-icon" data-feather="eye-off" style="display:none"></i>
        </div>
        <script src="https://unpkg.com/feather-icons"></script>
        <script>
            feather.replace();

            function togglePassword() {
                const input = document.getElementById('motDePasse');
                const eyeIcon = document.getElementById('eye-icon');
                const eyeOffIcon = document.getElementById('eye-off-icon');

                if (input.type === 'password') {
                    input.type = 'text';
                    eyeIcon.style.display = 'none';
                    eyeOffIcon.style.display = 'inline';
                } else {
                    input.type = 'password';
                    eyeIcon.style.display = 'inline';
                    eyeOffIcon.style.display = 'none';
                }
            }
        </script>

        <button type="submit"

        <button type="button"
