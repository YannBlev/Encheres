<!DOCTYPE html>
<html lang="fr" layout:decorate="~{layout/base}" xmlns:layout="http://www.w3.org/1999/xhtml">

<head>
                                <meta charset="UTF-8">
                            <title>Création de mon profil</title>
                <!--    Nouveau profil dans le menu : s'inscrire ou se connecter -->

</head>

<body>

<main layout:fragment="content">

                <!--    Nouveau profil dans le menu : s'inscrire ou se connecter -->

    <form th:action="@{/nouveauProfil}" method="post" th:object="${utilisateur}">

        <label for="pseudo">Pseudo : </label>
        <input type="text" id="pseudo" th:field="*{pseudo}" required><br>

        <label for="nom">Nom : </label>
        <input type="text" id="nom" th:field="*{nom}" required><br>

        <label for="prenom">Prenom : </label>
        <input type="text" id="prenom" th:field="*{prenom}" required><br>

        <label for="email">Email : </label>
        <input type="email" id="email" th:field="*{email}" required><br>

        <label for="telephone">Télephone : </label>
        <input type="tel" id="telephone" th:field="*{telephone}" required><br>

        <label for="rue">Rue : </label>
        <input type="text" id="rue" th:field="*{rue}" required><br>

        <label for="codePostal">Code Postal : </label>
        <input type="text" id="codePostal" th:field="*{codePostal}" pattern="[0-9]{5}" required><br>

        <label for="ville">Ville : </label>
        <input type="text" id="ville" th:field="*{ville}" required><br>

        <label for="motDePasse">Mot de passe : </label>
        <input type="password" id="motDePasse" th:field="*{motDePasse}" required><br>

        <!--    <label for="confirmation">Confirmation : </label>-->
        <!--    <input type="password" id="confirmation" th:field="*{confirmation}" required><br>-->

        <button type="submit">Création</button>

        <button type="button" th:onclick="|window.location.href='@{/index}'|">Annuler</button>

    </form>
</main>

</body>
</html>
