<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="#{retrait.titre}">Adresse Retrait</title>
</head>
<body>

<h2 th:text="#{retrait.ajouter}">Ajouter un retrait</h2>

<form th:action="@{/retrait}" method="post" th:object="${retrait}">

    <label th:text="#{retrait.label}">Retrait : </label>
    <input type="number" th:field="*{id}" required>
    <br>
    <input type="text" th:field="*{rue}" required>
    <br>
    <input type="text" th:field="*{code_postal}" required>
    <br>
    <input type="text" th:field="*{ville}" required>
    <br>

    <button type="submit" th:text="#{categorie.btn.valider}">Valider</button>
</form>

<h2 th:text="#{retrait.liste}">Liste des adresses de retrait</h2>

<table>
    <thead>
    <tr>
        <th th:text="#{retrait.table.id}">Id retrait</th>
        <th th:text="#{retrait.table.adresse}">Adresse</th>
        <th th:text="#{categorie.table.action}">Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="r : ${retraits}">
        <td th:text="${r.id}"></td>
        <td th:text="|${r.rue} ${r.code_postal} ${r.ville}|"></td>
        <td>
            <form class="inline-form" th:action="@{retrait/supprimer}" method="post">
                <button class="delete-button" type="submit" name="IdAdresseASupprimer" th:value="${r.id}">✗</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
