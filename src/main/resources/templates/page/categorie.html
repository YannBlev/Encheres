<!DOCTYPE html>
<html lang="fr" layout:decorate="~{layout/base}"
      xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="#{categorie.titre}">Catégorie</title>
</head>
<body>
<main layout:fragment="content">

    <h2 th:text="#{categorie.ajouter}">Ajouter une catégorie</h2>

    <form th:action="@{/encheres/categorie}" method="post" th:object="${categorie}">
        <label th:text="#{categorie.label}">Categorie : </label>
        <input type="text" th:field="*{libelle}" required>
        <br>
        <button type="submit" th:text="#{categorie.btn.valider}">Valider</button>
    </form>

    <h2 th:text="#{categorie.liste}">Liste des categories</h2>

    <div th:if="${messageErreur}" style="color: red" th:text="${messageErreur}">
        <span th:text="${messageErreur}"></span>
    </div>

    <div th:if="${messageSuccess}" style="color: green;">
        <span th:text="${messageSuccess}"></span>
    </div>

    <table>
        <thead>
        <tr>
            <th th:text="#{categorie.table.numero}">N° catégorie</th>
            <th th:text="#{categorie.table.categorie}">Catégorie</th>
            <th th:text="#{categorie.table.action}">Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${categories}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.libelle}"></td>
            <td>
                <form class="inline-form" th:action="@{/encheres/categorie/supprimer}" method="post">
                    <button class="delete-button" type="submit" name="idAsupprimer" th:value="${c.id}">✗</button>
                </form>
            </td>
        </tr>
    </table>
</tbody>


</main>
</body>
</html>
