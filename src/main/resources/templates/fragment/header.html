<header xmlns:sec="http://www.w3.org/1999/xhtml">
    <a><h2>ENI-Enchères</h2></a>

    <nav>

    <a href="/Encheres" sec:authorize="isAuthenticated()" th:text="#{menu.encheres}"></a>
    <a href="/encheres/nouvelleVente"  th:text="#{menu.vendreunarticle}"></a> <!-- sec:authorize="hasRole('admin')" -->
        <a th:href="@{/profil/{pseudo}(pseudo=${#authentication.principal.pseudo})}" sec:authorize="isAuthenticated()" th:text="#{menu.MonCompte}"></a>

        <section class="inline-display" sec:authorize="isAuthenticated()">
            <!-- on offre la possibilité de se déconnecter (${#authentication.name}" : recupère le username de l'utilisateur connecté) -->
            <form th:action="@{/logout}" method="post">
                <button th:text="|déconnecter : ${#authentication.name}|"></button>
            </form>
        </section>
        <!-- on n'affiche cette section que pour les utilisateurs NON connectés -->
        <section class="inline-display" sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}">S'incrire - Se connecter</a>
        </section>
    </nav>

</header>
