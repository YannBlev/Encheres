<!DOCTYPE html>
<html lang="en" layout:decorate="~{layout/base}" xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<body>

<main layout:fragment="content">
<section>
    <h1>Listes des enchères</h1>
    <h2>Filtres :</h2>
    <script th:src="@{js/search.js}"></script>

    <div>
        <input type="text" id="myInput" onkeyup="myFunction()" placeholder="Le nom de l'article contient" th:value="${recherche}">
        <button th:action="${categories}">Rechercher</button>
        <ul id="myUL">
            <li><a href="#Sport&Loisirs">Sport&Loisirs</a></li>
            <li><a href="#Informatique">Informatique</a></li>
            <li><a href="#Vêtement">Vêtement</a></li>
            <li><a href="#Ameublement">Ameublement</a></li>
        </ul>
    </div>

    <br>

    <label>Catégorie :</label>

    <select onchange="filterSelection(this.value)">
        <option value="all">Toutes</option>
        <option th:each="categorie : ${categories}" th:value="${categorie.id}" th:text="${categorie.libelle}"></option>
    </select>

    <div>
        <article th:each="article : ${articles}"
                 th:class="'filterDiv ' + ${article.categorie}">


            <div class="card" style="width: 10rem; " >
                <img th:src="@{|${article.imagePath}|}" style="width:100%">
                <div class="container">
                    <a sec:authorize="isAuthenticated()" th:href="@{|/encheres/article/${article.noArticle}|}" th:text="${article.nomArticle}"></a>
                    <span sec:authorize="!isAuthenticated()" th:text="${article.nomArticle}"></span>

                    <label>Prix: </label>
                    <span th:text="|${article.prixInitial} points|"></span>

                    <br>

                    <label>Fin :</label>
                    <span th:text="${article.dateFinEncheres}"></span>

                    <br>

                    <label>Vendeur :</label>
                    <span th:text="${article.vendeur.pseudo}"></span>
                </div>
            </div>

        </article>
    </div>

</section>

</main>

</body>
</html>
