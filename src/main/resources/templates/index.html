<!DOCTYPE html>
<html lang="en" layout:decorate="~{layout/base}" xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<body>

<main layout:fragment="content">
<section>
    <h1>Listes des enchères</h1>
    <h2>Filtres :</h2>

    <div class="input-box">
        <form class="search-form">
        <input name="recherche" placeholder="Le nom de l'article contient" th:value="${recherche}">
        <button>Rechercher</button>
        </form>
    </div>

    <br>

    <label>Catégorie :</label>
<!--            <select name="text" id="text">-->
<!--                <option value="" disabled selected>Toutes</option>-->
<!--                <option value="informatique">Informatique</option>-->
<!--                <option value="ameublement">Ameublement</option>-->
<!--                <option value="vêtement">Vêtements</option>-->
<!--                <option value="Sport&Loisirs">Sport & Loisirs</option>-->
<!--            </select>-->

<!--    <div id="myBtnContainer">-->
<!--        <button class="btn active" onclick="filterSelection('all')">Toutes</button>-->
<!--        <button class="btn" onclick="filterSelection('Informatique')"> Informatique</button>-->
<!--        <button class="btn" onclick="filterSelection('Ameublement')"> Ameublement</button>-->
<!--        <button class="btn" onclick="filterSelection('vetements')">Vêtements</button>-->
<!--        <button class="btn" onclick="filterSelection('Sport&Loisirs')"> Sport & Loisirs</button>-->
<!--    </div>-->
    <select onchange="filterSelection(this.value)">
        <option value="all">Toutes</option>
        <option value="Informatique">Informatique</option>
        <option value="Ameublement">Ameublement</option>
        <option value="vetements">Vêtements</option>
        <option value="Sport&Loisirs">Sport & Loisirs</option>
    </select>

    <div class="container">
        <article th:each="article : ${articles}"
                 th:class="'filterDiv ' + ${article.categorie.libelle}">

            <div class="card" style="width: 15rem; " >
                <img th:src="${article.imagePath}" style="width:100%">
                <div class="container">
                    <a sec:authorize="isAuthenticated()" th:href="@{|/encheres/${article.noArticle}|}" th:text="${article.nomArticle}"></a>
                    <span sec:authorize="!isAuthenticated()" th:text="${article.nomArticle}"></span>

                    <label>Prix: </label>
                    <span th:text="|${article.prixInitial} points|"></span>

                    <br>

                    <label>Fin :</label>
                    <span th:text="${article.dateFinEncheres}"></span>

                    <br>

                    <label>Vendeur :</label>
                    <span th:text="${article.vendeur.pseudo}"></span>
                </div>
            </div>

        </article>
    </div>

    <script>
        let categories = ["all", "Informatique", "Ameublement", "vetements", "Sport&Loisirs"];
        let index = 0;

        function nextCategory() {
            index = (index + 1) % categories.length;
            filterSelection(categories[index]);
        }
        filterSelection("all")
        function filterSelection(c) {
        var x, i;
        x = document.getElementsByClassName("filterDiv");
        if (c == "all") c = "";
        for (i = 0; i < x.length; i++) {
        w3RemoveClass(x[i], "show");
        if (x[i].className.indexOf(c) > -1) w3AddClass(x[i], "show");}
        }

        function w3AddClass(element, name) {
        var i, arr1, arr2;
        arr1 = element.className.split(" ");
        arr2 = name.split(" ");
        for (i = 0; i < arr2.length; i++) {
        if (arr1.indexOf(arr2[i]) == -1) {element.className += " " + arr2[i];}}
        }

        function w3RemoveClass(element, name) {
        var i, arr1, arr2;
        arr1 = element.className.split(" ");
        arr2 = name.split(" ");
        for (i = 0; i < arr2.length; i++) {
        while (arr1.indexOf(arr2[i]) > -1) {
        arr1.splice(arr1.indexOf(arr2[i]), 1);}
        }
        element.className = arr1.join(" ");}

        // Add active class to the current button (highlight it)
        var btnContainer = document.getElementById("myBtnContainer");
        var btns = btnContainer.getElementsByClassName("btn");
        for (var i = 0; i < btns.length; i++) {
        btns[i].addEventListener("click", function(){
            var current = document.getElementsByClassName("active");
            current[0].className = current[0].className.replace(" active", "");
            this.className += " active";});
        }
    </script>

    <article th:each="article : ${articles}">
        <div class="card" style="width: 18rem;">
            <img th:src="${article.imagePath}" alt="Avatar" style="width:100%">
            <div class="container">
                <h4 th:text="${article.nomArticle}"></h4><br>

                <label>Prix: </label>
                <span th:text="|${article.prixInitial} points|"></span>
                <br>

                <label>Fin de l'enchère :</label>
                <span th:text="${article.dateFinEncheres}"></span>
                <br>

                <label>Vendeur :</label>
                <span th:text="${article.vendeur.pseudo}"></span>
            </div>
        </div>
    </article>
</section>
</main>

</body>
</html>
