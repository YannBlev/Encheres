<!DOCTYPE html>
<html lang="en" layout:decorate="~{layout/base}" xmlns:layout="http://www.w3.org/1999/xhtml">
<body>

<main layout:fragment="content">
    <h1>Listes des enchères</h1>
    <h2>Filtres :</h2>

    <section>
        <div>
            <form class="search-form">
            <input name="recherche" placeholder="Le nom de l'article contient" th:value="${recherche}">
            <button>Rechercher</button>
            </form>
        </div>

        <br>

        <label>Catégorie :</label>
            <select name="text" id="text">
                <option value="" disabled selected>Toutes</option>
                <option value="informatique">Informatique</option>
                <option value="ameublement">Ameublement</option>
                <option value="vêtement">Vêtements</option>
                <option value="Sport&Loisirs">Sport & Loisirs</option>
            </select>
    </section>

    <section style="display: flex; flex-wrap: wrap;">
        <section class="my-5">
            <div class="container">
                <div class="row">
                    <div class="col-md-8 mx-auto">
                        <h2>Upload Image Example</h2>
                        <p th:text="${message}" th:if="${message ne null}" class="alert alert-primary"></p>
                        <form method="post" th:action="@{/upload}" enctype="multipart/form-data">
                            <div class="form-group">
                                <input type="file" name="image" accept="image/*" class="form-control-file">
                            </div>
                            <button type="submit" class="btn btn-primary">Upload image</button>
                        </form>
                        <span th:if="${msg != null}" th:text="${msg}"></span>
                    </div>
                </div>
            </div>
        </section>
        <article th:each="article : ${articles}">
            <div class="card">
                <img src="img_avatar.png" alt="Avatar" style="width:100%">
                <div class="container">
                    <h4 th:text="${article.nomArticle}"></h4><br>

                    <label>Prix: </label>
                    <span th:text="|${article.prixInitial} points|"></span>
                    <br>

                    <label>Fin de l'enchère :</label>
                    <span th:text="${article.dateFinEncheres}"></span>
                    <br>

                    <label>Vendeur :</label>
                    <span th:text="${article.vendeur.pseudo}"></span>

                </div>
            </div>
        </article>


    </section>
</main>

</body>
</html>
